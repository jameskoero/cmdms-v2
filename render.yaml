services:
  - type: web
    name: cmdms-v2
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cmdms-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://cmdms.onrender.com

databases:
  - name: cmdms-db
    databaseName: cmdms
    user: cmdms_user
    plan: free
